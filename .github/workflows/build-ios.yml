# Builds a signed Flutter iOS IPA, publishes a GitHub Release artifact,
# and updates AltStore source JSON committed to this repository.
#
# Required secrets: see ios/cloud-build/README.md
name: Build iOS IPA (AltStore)

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

env:
  IOS_BUNDLE_ID: com.example.njbibleapp
  IPA_FILENAME: TOTAStudyBible.ipa
  # ad-hoc | development | release-testing (must match your provisioning profile)
  IOS_EXPORT_METHOD: ad-hoc

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read app version from pubspec
        id: app_version
        run: |
          set -euo pipefail
          RAW=$(grep -E '^version:' pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//')
          VERSION="${RAW%%+*}"
          BUILD="${RAW#*+}"
          VERSION="${VERSION// /}"
          BUILD="${BUILD// /}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from pubspec.yaml"
            exit 1
          fi
          if [ "$BUILD" = "$RAW" ]; then BUILD="1"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION ($BUILD)"

      - name: Verify iOS signing secrets
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          test -n "$IOS_P12_BASE64" || { echo "::error::Missing IOS_P12_BASE64"; exit 1; }
          test -n "$IOS_P12_PASSWORD" || { echo "::error::Missing IOS_P12_PASSWORD"; exit 1; }
          test -n "$IOS_PROVISION_PROFILE_BASE64" || { echo "::error::Missing IOS_PROVISION_PROFILE_BASE64"; exit 1; }
          test -n "$IOS_TEAM_ID" || { echo "::error::Missing IOS_TEAM_ID"; exit 1; }
          test -n "$IOS_PROVISIONING_PROFILE_NAME" || { echo "::error::Missing IOS_PROVISIONING_PROFILE_NAME"; exit 1; }

      - name: Restore Firebase and local config from secrets
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          API_BIBLE_KEY: ${{ secrets.API_BIBLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${FIREBASE_OPTIONS_DART:-}" ]; then
            echo "::error::Add FIREBASE_OPTIONS_DART in Repo → Settings → Secrets → Actions"
            exit 1
          fi
          printf '%s' "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
          cp lib/bible/api_bible_local_key.example.dart lib/bible/api_bible_local_key.dart
          if [ -n "${GOOGLE_SERVICE_INFO_PLIST:-}" ]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist
          fi
          if [ ! -f assets/bible/kjv/Genesis.json ]; then
            echo "::error::assets/bible/ missing — commit bundled Bible JSON for iOS builds."
            exit 1
          fi

      - name: Import Apple distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install provisioning profile
        env:
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          echo -n "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${UUID}.mobileprovision"
          echo "Installed provisioning profile UUID: $UUID"

      - name: Generate CI signing config and ExportOptions.plist
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
          IOS_EXPORT_METHOD: ${{ env.IOS_EXPORT_METHOD }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/ios-generate-*.sh
          .github/scripts/ios-generate-ci-signing-xcconfig.sh
          .github/scripts/ios-generate-export-options.sh

      - name: Build signed IPA
        env:
          API_BIBLE_KEY: ${{ secrets.API_BIBLE_KEY }}
        run: |
          set -euo pipefail
          ARGS=(build ipa --release --export-options-plist=ios/signing/ExportOptions.plist)
          if [ -n "${API_BIBLE_KEY:-}" ]; then
            ARGS+=(--dart-define=API_BIBLE_KEY="$API_BIBLE_KEY")
          fi
          flutter "${ARGS[@]}"
          mkdir -p dist/ios
          IPA_SRC="$(find build/ios -name '*.ipa' -print -quit)"
          if [ -z "$IPA_SRC" ]; then
            echo "::error::No .ipa produced under build/ios"
            find build/ios -type f 2>/dev/null || true
            exit 1
          fi
          cp "$IPA_SRC" "dist/ios/${IPA_FILENAME}"
          ls -lh "dist/ios/${IPA_FILENAME}"

      - name: Upload IPA workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: dist/ios/TOTAStudyBible.ipa
          if-no-files-found: error

      - name: Create GitHub Release with IPA
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v${{ steps.app_version.outputs.version }}-${{ github.run_number }}
          name: iOS v${{ steps.app_version.outputs.version }} (${{ steps.app_version.outputs.build }})
          body: |
            Signed **TOTA Study Bible** IPA for AltStore sideloading.

            - Version: `${{ steps.app_version.outputs.version }}`
            - Build: `${{ steps.app_version.outputs.build }}`
            - Bundle ID: `${{ env.IOS_BUNDLE_ID }}`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Add AltStore source URL:
            `https://raw.githubusercontent.com/${{ github.repository }}/main/ios/altstore/altstore-source.json`
          files: dist/ios/${{ env.IPA_FILENAME }}
          fail_on_unmatched_files: true

      - name: Update AltStore manifest JSON in repo
        env:
          VERSION: ${{ steps.app_version.outputs.version }}
          BUILD: ${{ steps.app_version.outputs.build }}
        run: |
          set -euo pipefail
          TAG="ios-v${VERSION}-${{ github.run_number }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${IPA_FILENAME}"
          chmod +x .github/scripts/ios-update-altstore-manifest.sh
          .github/scripts/ios-update-altstore-manifest.sh \
            "$VERSION" \
            "$BUILD" \
            "dist/ios/${IPA_FILENAME}" \
            "$DOWNLOAD_URL"

      - name: Commit updated AltStore manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(ios): update AltStore manifest v${{ steps.app_version.outputs.version }} [skip ci]"
          file_pattern: ios/altstore/*.json
          branch: main
