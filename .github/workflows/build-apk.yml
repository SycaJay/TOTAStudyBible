name: Build and Deploy APK

on:
  workflow_dispatch:
    inputs:
      upload_version_json:
        description: Upload version.json to Hostinger (off by default)
        type: boolean
        default: false
  push:
    branches: [main]

env:
  APK_PUBLIC_URL: https://studybible.totaonline.com/app.apk
  VERSION_JSON_PUBLIC_URL: https://studybible.totaonline.com/version.json

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read app version from pubspec
        id: app_version
        run: |
          set -euo pipefail
          RAW=$(grep -E '^version:' pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//')
          VERSION="${RAW%%+*}"
          VERSION="${VERSION// /}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from pubspec.yaml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version (pubspec): $VERSION"

      - name: Restore Firebase and local config from secrets
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          BIBLE_ASSETS_BASE64: ${{ secrets.BIBLE_ASSETS_BASE64 }}
          API_BIBLE_KEY: ${{ secrets.API_BIBLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_SERVICES_JSON:-}" ] || [ -z "${FIREBASE_OPTIONS_DART:-}" ]; then
            echo "::error::Add GOOGLE_SERVICES_JSON and FIREBASE_OPTIONS_DART in Repo → Settings → Secrets → Actions"
            exit 1
          fi

          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          printf '%s' "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
          cp lib/bible/api_bible_local_key.example.dart lib/bible/api_bible_local_key.dart

          HAS_ASSETS=false
          HAS_API=false
          if [ -f assets/bible/kjv/Genesis.json ]; then
            HAS_ASSETS=true
            echo "Using bundled Bible JSON from repo (assets/bible/)."
          fi
          if [ -n "${BIBLE_ASSETS_BASE64:-}" ]; then
            echo "$BIBLE_ASSETS_BASE64" | base64 -d > bible-assets.zip
            unzip -q -o bible-assets.zip -d .
            rm bible-assets.zip
            HAS_ASSETS=true
            echo "Restored bundled Bible JSON from BIBLE_ASSETS_BASE64 secret."
          fi
          if [ -n "${API_BIBLE_KEY:-}" ]; then
            HAS_API=true
            echo "API_BIBLE_KEY is set (online Bible fallback / API-only versions)."
          fi
          if [ "$HAS_ASSETS" = false ] && [ "$HAS_API" = false ]; then
            echo "::error::No Bible text for this build. Commit assets/bible/ to the repo (git add assets/bible) and push, or add BIBLE_ASSETS_BASE64 / API_BIBLE_KEY secrets."
            exit 1
          fi
          if [ "$HAS_ASSETS" = false ]; then
            echo "::warning::No assets/bible/ in build — APK will rely on API_BIBLE_KEY and the internet for scripture."
          fi

      - name: Build release APK
        env:
          API_BIBLE_KEY: ${{ secrets.API_BIBLE_KEY }}
        run: |
          set -euo pipefail
          EXTRA_DEFINE=()
          if [ -n "${API_BIBLE_KEY:-}" ]; then
            EXTRA_DEFINE+=(--dart-define=API_BIBLE_KEY="$API_BIBLE_KEY")
          fi
          flutter build apk --release "${EXTRA_DEFINE[@]}"

      - name: Prepare Hostinger deploy files
        run: |
          set -euo pipefail
          APK_SRC=""
          for candidate in \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/apk/release/app-release.apk; do
            if [ -f "$candidate" ]; then
              APK_SRC="$candidate"
              break
            fi
          done
          if [ -z "$APK_SRC" ]; then
            APK_SRC="$(find build/app/outputs -type f -name 'app-release.apk' 2>/dev/null | head -1 || true)"
          fi
          if [ -z "$APK_SRC" ] || [ ! -f "$APK_SRC" ]; then
            echo "::error::Release APK not found under build/app/outputs"
            find build/app/outputs -type f -name '*.apk' 2>/dev/null || true
            exit 1
          fi
          echo "Using APK: $APK_SRC ($(du -h "$APK_SRC" | cut -f1))"

          rm -rf ftp-upload-apk
          mkdir -p ftp-upload-apk
          cp "$APK_SRC" ftp-upload-apk/app.apk
          printf '%s\n' "{" > ftp-upload-apk/version.json
          printf '  "version": "%s",\n' "${{ steps.app_version.outputs.version }}" >> ftp-upload-apk/version.json
          printf '  "apk_url": "%s"\n' "$APK_PUBLIC_URL" >> ftp-upload-apk/version.json
          printf '%s\n' "}" >> ftp-upload-apk/version.json
          echo "APK FTP upload tree (root only — no windows/):"
          ls -la ftp-upload-apk/
          test -f ftp-upload-apk/app.apk
          test -f ftp-upload-apk/version.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            ftp-upload-apk/app.apk
            ftp-upload-apk/version.json
          if-no-files-found: error

      # Hostinger FTP home = public_html. Upload only app.apk + root version.json.
      - name: Upload app.apk and version.json to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ftp-upload-apk/
          server-dir: ./
          state-name: .ftp-deploy-sync-state-apk.json
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            windows/**
            macos/**
