name: Build and Deploy APK

on:
  workflow_dispatch:
    inputs:
      upload_version_json:
        description: Upload version.json to Hostinger (off by default)
        type: boolean
        default: false
  push:
    branches: [main]

env:
  APK_PUBLIC_URL: https://studybible.totaonline.com/app.apk
  VERSION_JSON_PUBLIC_URL: https://studybible.totaonline.com/version.json

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read app version from pubspec
        id: app_version
        run: |
          set -euo pipefail
          RAW=$(grep -E '^version:' pubspec.yaml | head -1 | sed 's/^version:[[:space:]]*//')
          VERSION="${RAW%%+*}"
          VERSION="${VERSION// /}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from pubspec.yaml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version (pubspec): $VERSION"

      - name: Restore Firebase and local config from secrets
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
          BIBLE_ASSETS_BASE64: ${{ secrets.BIBLE_ASSETS_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_SERVICES_JSON:-}" ] || [ -z "${FIREBASE_OPTIONS_DART:-}" ]; then
            echo "::error::Add GOOGLE_SERVICES_JSON and FIREBASE_OPTIONS_DART in Repo → Settings → Secrets → Actions"
            exit 1
          fi

          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          printf '%s' "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
          cp lib/bible/api_bible_local_key.example.dart lib/bible/api_bible_local_key.dart

          if [ -n "${BIBLE_ASSETS_BASE64:-}" ]; then
            echo "$BIBLE_ASSETS_BASE64" | base64 -d > bible-assets.zip
            unzip -q -o bible-assets.zip -d .
            rm bible-assets.zip
          else
            echo "BIBLE_ASSETS_BASE64 not set — using minimal stub Bible JSON so the build can complete."
            for id in kjv niv nkjv asv darby ylt webster geneva1599 douay1895 rv1895 web wmb; do
              mkdir -p "assets/bible/$id"
              printf '%s\n' '{"book":"Genesis","chapters":[{"chapter":"1","verses":[{"verse":"1","text":"In the beginning God created the heaven and the earth."}]}]}' \
                > "assets/bible/$id/Genesis.json"
            done
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare Hostinger deploy files
        run: |
          set -euo pipefail
          APK_SRC=""
          for candidate in \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/apk/release/app-release.apk; do
            if [ -f "$candidate" ]; then
              APK_SRC="$candidate"
              break
            fi
          done
          if [ -z "$APK_SRC" ]; then
            APK_SRC="$(find build/app/outputs -type f -name 'app-release.apk' 2>/dev/null | head -1 || true)"
          fi
          if [ -z "$APK_SRC" ] || [ ! -f "$APK_SRC" ]; then
            echo "::error::Release APK not found under build/app/outputs"
            find build/app/outputs -type f -name '*.apk' 2>/dev/null || true
            exit 1
          fi
          echo "Using APK: $APK_SRC ($(du -h "$APK_SRC" | cut -f1))"

          rm -rf deploy
          mkdir -p deploy
          cp "$APK_SRC" deploy/app.apk
          printf '%s\n' "{" > deploy/version.json
          printf '  "version": "%s",\n' "${{ steps.app_version.outputs.version }}" >> deploy/version.json
          printf '  "apk_url": "%s"\n' "$APK_PUBLIC_URL" >> deploy/version.json
          printf '%s\n' "}" >> deploy/version.json
          ls -la deploy/
          test -f deploy/app.apk
          test -f deploy/version.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            deploy/app.apk
            deploy/version.json
          if-no-files-found: error

      # Hostinger FTP user usually lands in public_html already — do not set server-dir to public_html/.
      - name: Upload app.apk and version.json to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy/
          server-dir: ./
          dangerous-clean-slate: false
          log-level: verbose
